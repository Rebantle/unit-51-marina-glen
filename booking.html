<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Now</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">🌴 My Accommodation</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="booking.html">Book Now</a>
        <a href="pages/contact.html">Contact</a>
    </nav>
</header>

<section class="services">
    <h2>Book Your Stay</h2>

    <div style="max-width:500px;margin:auto;">
        <label>Full Name</label>
        <input id="name" type="text" style="width:100%;padding:10px;margin-bottom:10px;">

        <label>Phone</label>
        <input id="phone" type="text" style="width:100%;padding:10px;margin-bottom:10px;">

        <label>Check-in Date</label>
        <input id="checkin" type="date" style="width:100%;padding:10px;margin-bottom:10px;">

        <label>Check-out Date</label>
        <input id="checkout" type="date" style="width:100%;padding:10px;margin-bottom:10px;">

        <button onclick="makeBooking()" class="btn">Book Now</button>

        <p id="message" style="margin-top:15px;font-weight:bold;"></p>
        <hr style="margin:30px 0;">
<h3>Already Booked Dates</h3>
<ul id="bookedDates"></ul>

    </div>
</section>

<script src="js/booking.js"></script>
</body>
</html>
